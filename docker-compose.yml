version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobtrackr_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/jobtrackr_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ZGV2ZWxvcG1lbnQtand0LXNlY3JldC1mb3Itam9idHJhY2tyLWFpLXRva2VuLTEyMzQ1Njc4OTA=
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
